name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "PRODUCTION" (all caps) to confirm production deployment'
        required: true
        type: string

env:
  SOLUTION_NAME: CATToolsActivatePipeline

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Deploy to Production Environment
    runs-on: windows-latest
    environment: production
    if: github.event.inputs.confirm == 'PRODUCTION'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate
        run: |
          pac auth create `
            --name ProdEnvironment `
            --applicationId ${{ secrets.PP_CLIENT_ID }} `
            --clientSecret ${{ secrets.PP_CLIENT_SECRET }} `
            --tenant ${{ secrets.PP_TENANT_ID }} `
            --environment ${{ secrets.PP_PROD_ENV_URL }}

      - name: Pack Solution (Managed for Production)
        run: |
          pac solution pack `
            --zipfile "${{ env.SOLUTION_NAME }}_managed.zip" `
            --folder solution `
            --packagetype Managed

      - name: Import Managed Solution
        run: |
          pac solution import `
            --path "${{ env.SOLUTION_NAME }}_managed.zip" `
            --activate-plugins true `
            --force-overwrite true `
            --async true

      - name: Publish Customizations
        run: pac org publish-all
