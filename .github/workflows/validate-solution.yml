name: Validate Power Platform Solution

on:
  pull_request:
    branches: [master]
    paths:
      - 'solution/**'
      - 'tests/**'
      - 'config/**'
      - 'src/**'

env:
  SOLUTION_NAME: CATToolsActivatePipeline
  SOLUTION_FOLDER: solution
  SOLUTION_TYPE: Unmanaged

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  validate:
    name: Pack & Validate Solution
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: |
          pac auth create `
            --name DevEnvironment `
            --githubFederated `
            --applicationId ${{ secrets.PP_CLIENT_ID }} `
            --tenant ${{ secrets.PP_TENANT_ID }} `
            --environment ${{ secrets.PP_DEV_ENV_URL }}

      - name: Pack Solution
        run: |
          pac solution pack `
            --zipfile "${{ env.SOLUTION_NAME }}.zip" `
            --folder "${{ env.SOLUTION_FOLDER }}" `
            --packagetype ${{ env.SOLUTION_TYPE }} `
            --allowDelete true `
            --allowWrite true

      - name: Run Solution Checker
        run: |
          pac solution check `
            --path "${{ env.SOLUTION_NAME }}.zip" `
            --outputDirectory "checker-results"
        continue-on-error: true

      - name: Import to Dev Environment
        id: import
        run: |
          pac solution import `
            --path "${{ env.SOLUTION_NAME }}.zip" `
            --activate-plugins true `
            --force-overwrite true `
            --async true
        continue-on-error: true

      - name: Run Dataverse Schema Validation
        if: steps.import.outcome == 'success'
        id: schema-validation
        run: |
          .\tests\scripts\Run-DataverseValidation.ps1 `
            -ValidationFile "tests/dataverse/schema-validation.json" `
            -OutputDirectory "TestOutput/dataverse"
        continue-on-error: true

      - name: Post Schema Validation Results to PR
        if: always() && hashFiles('TestOutput/dataverse/schema-validation-summary.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'TestOutput/dataverse/schema-validation-summary.md';
            if (fs.existsSync(summaryPath)) {
              const summary = fs.readFileSync(summaryPath, 'utf8');
              const prNumber = context.payload.pull_request?.number;
              if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: summary
                });
              }
              // Also write to GitHub Actions Job Summary
              await core.summary.addRaw(summary).write();
            }

      - name: Upload Solution Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solution-zip
          path: "${{ env.SOLUTION_NAME }}.zip"

      - name: Upload Checker Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checker-results
          path: checker-results/
          if-no-files-found: ignore

      - name: Upload Dataverse Validation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dataverse-validation-results
          path: TestOutput/dataverse/
          if-no-files-found: ignore

  test:
    name: Run Automated Tests
    needs: validate
    runs-on: windows-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright & Dependencies
        run: |
          cd tests/e2e
          npm ci
          npx playwright install chromium --with-deps

      - name: Install PAC CLI Playwright
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI 2>$null
          playwright install chromium 2>$null
        continue-on-error: true

      - name: Authenticate to Power Platform
        run: |
          pac auth create `
            --name DevEnvironment `
            --githubFederated `
            --applicationId ${{ secrets.PP_CLIENT_ID }} `
            --tenant ${{ secrets.PP_TENANT_ID }} `
            --environment ${{ secrets.PP_DEV_ENV_URL }}

      - name: Acquire Access Token for E2E Tests
        id: token
        run: |
          $tokenResponse = Invoke-RestMethod `
            -Method Post `
            -Uri "https://login.microsoftonline.com/${{ secrets.PP_TENANT_ID }}/oauth2/v2.0/token" `
            -Body @{
              grant_type    = "client_credentials"
              client_id     = "${{ secrets.PP_CLIENT_ID }}"
              client_secret = "${{ secrets.PP_CLIENT_SECRET }}"
              scope         = "${{ secrets.PP_DEV_ENV_URL }}/.default"
            } -ErrorAction SilentlyContinue

          if ($tokenResponse) {
            echo "PP_ACCESS_TOKEN=$($tokenResponse.access_token)" >> $env:GITHUB_ENV
            echo "token_acquired=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "token_acquired=false" >> $env:GITHUB_OUTPUT
            Write-Warning "Could not acquire token — E2E tests will be skipped"
          }
        continue-on-error: true

      - name: Run Playwright E2E Tests (Schema Validation)
        if: steps.token.outputs.token_acquired == 'true'
        run: |
          cd tests/e2e
          npx playwright test schema-validation --reporter=html,json,github
        env:
          PP_DEV_ENV_URL: ${{ secrets.PP_DEV_ENV_URL }}
          PP_ACCESS_TOKEN: ${{ env.PP_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Run Playwright E2E Tests (Code App)
        if: steps.token.outputs.token_acquired == 'true'
        run: |
          cd tests/e2e
          npx playwright test code-app --reporter=html,json,github
        env:
          PP_DEV_ENV_URL: ${{ secrets.PP_DEV_ENV_URL }}
          PP_ACCESS_TOKEN: ${{ env.PP_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Run Canvas App Tests (PAC Test Engine)
        if: hashFiles('tests/canvas/*.te.yaml') != ''
        run: |
          Get-ChildItem -Path tests/canvas -Filter "*.te.yaml" | ForEach-Object {
            Write-Host "Running test: $($_.Name)"
            pac test run `
              --provider "canvas" `
              --test-plan-file $_.FullName `
              --tenant ${{ secrets.PP_TENANT_ID }} `
              --environment ${{ secrets.PP_DEV_ENV_ID }}
          }
        continue-on-error: true

      - name: Run MDA Tests (PAC Test Engine)
        if: hashFiles('tests/mda/*.te.yaml') != ''
        run: |
          Get-ChildItem -Path tests/mda -Filter "*.te.yaml" | ForEach-Object {
            Write-Host "Running test: $($_.Name)"
            pac test run `
              --provider "mda" `
              --test-plan-file $_.FullName `
              --tenant ${{ secrets.PP_TENANT_ID }} `
              --environment ${{ secrets.PP_DEV_ENV_ID }}
          }
        continue-on-error: true

      - name: Run Dataverse Schema Validation (PowerShell)
        run: |
          .\tests\scripts\Run-DataverseValidation.ps1 `
            -ValidationFile "tests/dataverse/schema-validation.json" `
            -OutputDirectory "TestOutput/dataverse"
        continue-on-error: true

      - name: Post Test Summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summaryParts = [];

            // Collect markdown summaries from all test sources
            const mdFiles = [
              'TestOutput/dataverse/schema-validation-summary.md'
            ];

            for (const mdFile of mdFiles) {
              if (fs.existsSync(mdFile)) {
                summaryParts.push(fs.readFileSync(mdFile, 'utf8'));
              }
            }

            // Add Playwright results summary
            const playwrightResults = 'TestOutput/e2e/results.json';
            if (fs.existsSync(playwrightResults)) {
              try {
                const results = JSON.parse(fs.readFileSync(playwrightResults, 'utf8'));
                const stats = results.stats || {};
                const passed = stats.expected || 0;
                const failed = stats.unexpected || 0;
                const skipped = stats.skipped || 0;
                const icon = failed > 0 ? '❌' : '✅';

                summaryParts.push(
                  `## ${icon} Playwright E2E Tests\n\n` +
                  `| Metric | Count |\n|--------|-------|\n` +
                  `| ✅ Passed | ${passed} |\n` +
                  `| ❌ Failed | ${failed} |\n` +
                  `| ⏭️ Skipped | ${skipped} |\n` +
                  `| 📊 Total | ${passed + failed + skipped} |\n\n` +
                  `> Full HTML report available in the \`e2e-test-results\` artifact.`
                );
              } catch (e) {
                console.log('Could not parse Playwright results:', e.message);
              }
            }

            if (summaryParts.length > 0) {
              const fullSummary = summaryParts.join('\n\n---\n\n');
              const prNumber = context.payload.pull_request?.number;
              if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `# 🧪 Automated Test Results\n\n${fullSummary}`
                });
              }
              await core.summary.addRaw(fullSummary).write();
            }

      - name: Upload Dataverse Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestOutput/
          if-no-files-found: ignore

      - name: Upload Playwright E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: TestOutput/e2e/
          if-no-files-found: ignore

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: TestOutput/e2e/test-results/
          if-no-files-found: ignore
