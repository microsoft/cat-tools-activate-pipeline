name: Validate Power Platform Solution

on:
  pull_request:
    branches: [master]
    paths:
      - 'solution/**'
      - 'tests/**'
      - 'config/**'

env:
  SOLUTION_NAME: CATToolsActivatePipeline
  SOLUTION_FOLDER: solution
  SOLUTION_TYPE: Unmanaged

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  validate:
    name: Pack & Validate Solution
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: |
          pac auth create `
            --name DevEnvironment `
            --githubFederated `
            --applicationId ${{ secrets.PP_CLIENT_ID }} `
            --tenant ${{ secrets.PP_TENANT_ID }} `
            --environment ${{ secrets.PP_DEV_ENV_URL }}

      - name: Pack Solution
        run: |
          pac solution pack `
            --zipfile "${{ env.SOLUTION_NAME }}.zip" `
            --folder "${{ env.SOLUTION_FOLDER }}" `
            --packagetype ${{ env.SOLUTION_TYPE }} `
            --allowDelete true `
            --allowWrite true

      - name: Run Solution Checker
        run: |
          pac solution check `
            --path "${{ env.SOLUTION_NAME }}.zip" `
            --outputDirectory "checker-results"
        continue-on-error: true

      - name: Import to Dev Environment
        id: import
        run: |
          pac solution import `
            --path "${{ env.SOLUTION_NAME }}.zip" `
            --activate-plugins true `
            --force-overwrite true `
            --async true
        continue-on-error: true

      - name: Run Dataverse Schema Validation
        if: steps.import.outcome == 'success'
        id: schema-validation
        run: |
          .\tests\scripts\Run-DataverseValidation.ps1 `
            -ValidationFile "tests/dataverse/schema-validation.json" `
            -OutputDirectory "TestOutput/dataverse"
        continue-on-error: true

      - name: Post Schema Validation Results to PR
        if: always() && hashFiles('TestOutput/dataverse/schema-validation-summary.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'TestOutput/dataverse/schema-validation-summary.md';
            if (fs.existsSync(summaryPath)) {
              const summary = fs.readFileSync(summaryPath, 'utf8');
              const prNumber = context.payload.pull_request?.number;
              if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: summary
                });
              }
              // Also write to GitHub Actions Job Summary
              await core.summary.addRaw(summary).write();
            }

      - name: Upload Solution Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solution-zip
          path: "${{ env.SOLUTION_NAME }}.zip"

      - name: Upload Checker Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checker-results
          path: checker-results/
          if-no-files-found: ignore

      - name: Upload Dataverse Validation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dataverse-validation-results
          path: TestOutput/dataverse/
          if-no-files-found: ignore

  test:
    name: Run Automated Tests
    needs: validate
    runs-on: windows-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Install Playwright Browsers
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install chromium

      - name: Authenticate to Power Platform
        run: |
          pac auth create `
            --name DevEnvironment `
            --githubFederated `
            --applicationId ${{ secrets.PP_CLIENT_ID }} `
            --tenant ${{ secrets.PP_TENANT_ID }} `
            --environment ${{ secrets.PP_DEV_ENV_URL }}

      - name: Run Canvas App Tests
        if: hashFiles('tests/canvas/*.te.yaml') != ''
        run: |
          Get-ChildItem -Path tests/canvas -Filter "*.te.yaml" | ForEach-Object {
            Write-Host "Running test: $($_.Name)"
            pac test run `
              --provider "canvas" `
              --test-plan-file $_.FullName `
              --tenant ${{ secrets.PP_TENANT_ID }} `
              --environment ${{ secrets.PP_DEV_ENV_ID }}
          }
        continue-on-error: true

      - name: Run MDA Tests
        if: hashFiles('tests/mda/*.te.yaml') != ''
        run: |
          Get-ChildItem -Path tests/mda -Filter "*.te.yaml" | ForEach-Object {
            Write-Host "Running test: $($_.Name)"
            pac test run `
              --provider "mda" `
              --test-plan-file $_.FullName `
              --tenant ${{ secrets.PP_TENANT_ID }} `
              --environment ${{ secrets.PP_DEV_ENV_ID }}
          }
        continue-on-error: true

      - name: Run Dataverse Schema Validation
        run: |
          .\tests\scripts\Run-DataverseValidation.ps1 `
            -ValidationFile "tests/dataverse/schema-validation.json" `
            -OutputDirectory "TestOutput/dataverse"
        continue-on-error: true

      - name: Post Test Summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');
            let summaryParts = [];
            
            // Collect all markdown summaries from test output
            const mdFiles = [
              'TestOutput/dataverse/schema-validation-summary.md'
            ];
            
            for (const mdFile of mdFiles) {
              if (fs.existsSync(mdFile)) {
                summaryParts.push(fs.readFileSync(mdFile, 'utf8'));
              }
            }
            
            if (summaryParts.length > 0) {
              const fullSummary = summaryParts.join('\n\n---\n\n');
              const prNumber = context.payload.pull_request?.number;
              if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `# 🧪 Automated Test Results\n\n${fullSummary}`
                });
              }
              await core.summary.addRaw(fullSummary).write();
            }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestOutput/
          if-no-files-found: ignore
