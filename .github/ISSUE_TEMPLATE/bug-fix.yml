name: "🐛 Bug Fix"
description: "Fix an issue with the Power Platform solution"
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dataverse Schema
        - Canvas App
        - Model-Driven App
        - Cloud Flow
        - Copilot Studio Agent
        - Power BI Report
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What's broken?
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the Community Portal app
        2. Navigate to "My Submissions"
        3. Click "New Submission"
        4. Notice the form doesn't load
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Fix Verification
      description: How do we verify the fix works?
    validations:
      required: true
